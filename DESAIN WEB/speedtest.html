<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            opacity: 0.8;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .speed-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 25px;
            margin: 15px 0;
            backdrop-filter: blur(10px);
        }

        .speed-value {
            font-size: 3em;
            font-weight: bold;
            margin: 10px 0;
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .speed-label {
            font-size: 1.1em;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ping-value {
            color: #ffeb3b;
        }

        .btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin: 20px 0;
            font-size: 1.2em;
            min-height: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc6a);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .results {
            display: none;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .testing {
            animation: pulse 1.5s infinite;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                margin: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .speed-value {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 SpeedTest</h1>
        <p class="subtitle">Uji kecepatan internet Anda</p>
        
        <div class="status" id="status">Klik tombol untuk mulai test</div>
        
        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <button class="btn" id="startBtn" onclick="startTest()">Mulai SpeedTest</button>
        
        <div class="results" id="results">
            <div class="speed-card">
                <div class="speed-label">Download</div>
                <div class="speed-value" id="downloadSpeed">-- Mbps</div>
            </div>
            <div class="speed-card">
                <div class="speed-label">Upload</div>
                <div class="speed-value" id="uploadSpeed">-- Mbps</div>
            </div>
            <div class="speed-card">
                <div class="speed-label ping-value">Ping</div>
                <div class="speed-value ping-value" id="pingValue">-- ms</div>
            </div>
            <button class="btn" onclick="startTest()">Test Lagi</button>
        </div>
    </div>

    <script>
        let isTesting = false;
        let testInterval;

        async function startTest() {
            if (isTesting) return;
            
            isTesting = true;
            const startBtn = document.getElementById('startBtn');
            const status = document.getElementById('status');
            const progressBar = document.getElementById('progressBar');
            const results = document.getElementById('results');
            
            startBtn.disabled = true;
            startBtn.textContent = 'Testing...';
            status.textContent = 'Mencari server terdekat...';
            status.classList.add('testing');
            progressBar.style.display = 'block';
            results.style.display = 'none';
            
            try {
                // Test Ping
                status.textContent = 'Mengukur ping...';
                const ping = await measurePing();
                document.getElementById('pingValue').textContent = ping + ' ms';
                
                // Test Download
                updateProgress(33);
                status.textContent = 'Mengukur kecepatan download...';
                const downloadSpeed = await measureDownload();
                document.getElementById('downloadSpeed').textContent = (downloadSpeed).toFixed(2) + ' Mbps';
                
                // Test Upload
                updateProgress(66);
                status.textContent = 'Mengukur kecepatan upload...';
                const uploadSpeed = await measureUpload();
                document.getElementById('uploadSpeed').textContent = (uploadSpeed).toFixed(2) + ' Mbps';
                
                updateProgress(100);
                status.textContent = 'Test selesai! ✅';
                status.classList.remove('testing');
                
                setTimeout(() => {
                    results.style.display = 'block';
                    progressBar.style.display = 'none';
                    startBtn.disabled = false;
                    startBtn.textContent = 'Test Lagi';
                }, 1000);
                
            } catch (error) {
                status.textContent = 'Error: ' + error.message;
                status.classList.remove('testing');
                startBtn.disabled = false;
                startBtn.textContent = 'Mulai SpeedTest';
            }
            
            isTesting = false;
        }

        async function measurePing() {
            const startTime = performance.now();
            await fetch('https://www.google.com/favicon.ico', { method: 'HEAD', mode: 'no-cors' });
            const endTime = performance.now();
            return Math.round(endTime - startTime);
        }

        async function measureDownload() {
            const testFile = await fetchTestFile();
            const startTime = performance.now();
            const response = await fetch(testFile);
            const buffer = await response.arrayBuffer();
            const endTime = performance.now();
            
            const duration = (endTime - startTime) / 1000; // seconds
            const bitsLoaded = buffer.byteLength * 8;
            const speedBps = bitsLoaded / duration;
            return speedBps / 1000 / 1000; // Mbps
        }

        async function measureUpload() {
            const testData = new ArrayBuffer(5 * 1024 * 1024); // 5MB
            const startTime = performance.now();
            
            try {
                await fetch('https://httpbin.org/post', {
                    method: 'POST',
                    body: testData,
                    headers: {
                        'Content-Type': 'application/octet-stream'
                    }
                });
            } catch (e) {
                // Fallback untuk CORS
                await new Promise(resolve => setTimeout(resolve, 2000));
            }
            
            const endTime = performance.now();
            const duration = (endTime - startTime) / 1000;
            const bitsSent = testData.byteLength * 8;
            return (bitsSent / duration) / 1000 / 1000; // Mbps
        }

        async function fetchTestFile() {
            // Menggunakan file test dari CDN publik
            const sizes = ['100KB', '500KB', '1MB'];
            const randomSize = sizes[Math.floor(Math.random() * sizes.length)];
            return `https://speedtest.wdc01.softlayer.com/downloads/test${randomSize}.zip`;
        }

        function updateProgress(percent) {
            document.getElementById('progressFill').style.width = percent + '%';
        }

        // Auto-refresh ping setiap 5 detik saat hasil ditampilkan
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && document.getElementById('results').style.display === 'block') {
                updatePing();
            }
        });

        async function updatePing() {
            try {
                const ping = await measurePing();
                document.getElementById('pingValue').textContent = ping + ' ms';
            } catch (e) {
                // Silent fail
            }
        }
    </script>
</body>
</html>
