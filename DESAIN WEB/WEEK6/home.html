<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Saya - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #000000 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .nav-container {
            max-width: 800px;
            margin: 50px auto;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .header {
            background-color: #1a1a1a;
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            margin-bottom: 0;
        }

        h1 {
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .menu {
            background-color: #2980b9;
            padding: 15px;
            border-radius: 0 0 10px 10px;
            text-align: center;
        }

        input[type="submit"] {
            background-color: #818181;
            color: #fdfeff;
            border: none;
            padding: 12px 30px;
            margin: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #000000;
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .nav-container {
                margin: 20px auto;
            }
            
            .menu input[type="submit"] {
                display: block;
                width: 80%;
                margin: 10px auto;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <div class="header">
            <h1 align="center">SELAMAT DATANG</h1>
            <h1 align="center">DI WEB SAYA</h1>
        </div>
        
        <div class="menu">
            <form style="display: inline;">
                <input type="submit" value="HOME" formaction="home.html">
                <input type="submit" value="BIODATA" formaction="main.html">
                <input type="submit" value="GALERI" formaction="galeri.html">
                <input type="submit" value="DAFTAR" formaction="latihann.html">
            </form>
        </div>
    </div>
</body>
</html>
