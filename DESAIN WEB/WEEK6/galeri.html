<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Saya - Galeri Multimedia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #000000 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .nav-container {
            max-width: 800px;
            margin: 0 auto 30px auto;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .header {
            background-color: #1a1a1a;
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            margin-bottom: 0;
        }

        h1 {
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .menu {
            background-color: #2980b9;
            padding: 15px;
            border-radius: 0 0 10px 10px;
            text-align: center;
        }

        input[type="submit"] {
            background-color: #818181;
            color: #fdfeff;
            border: none;
            padding: 12px 30px;
            margin: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #000000;
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }

        .gallery-wrapper {
            max-width: 1200px;
            margin: 30px auto;
            padding: 30px;
            background: rgba(19, 19, 19, 0.95);
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gallery-title {
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
            font-size: 2em;
            position: relative;
            padding-bottom: 15px;
        }

        .gallery-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(135deg, #002fff 0%, #1d0183 100%);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 15px;
            text-align: center;
        }

        .image-container {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            background: #f5f5f5;
        }

        .image-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .image-container:hover img {
            transform: scale(1.1);
        }

        .video-container {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            background: #000;
        }

        video {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            text-align: center;
        }

        .image-container:hover .image-overlay {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .nav-container {
                margin: 20px auto;
            }
            
            table, tbody, tr {
                display: block;
            }
            
            td {
                display: block;
                width: 100%;
                padding: 10px 0;
            }
            
            .menu input[type="submit"] {
                display: block;
                width: 80%;
                margin: 10px auto;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .gallery-wrapper {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <div class="header">
            <h1 align="center">SELAMAT DATANG</h1>
            <h1 align="center">DI WEB SAYA</h1>
        </div>
        
        <div class="menu">
            <form style="display: inline;">
                <input type="submit" value="HOME" formaction="home.html">
                <input type="submit" value="BIODATA" formaction="main.html">
                <input type="submit" value="GALERI" formaction="galeri.html">
                <input type="submit" value="DAFTAR" formaction="latihann.html">
            </form>
        </div>
    </div>

    <div class="gallery-wrapper">
        <h2 class="gallery-title">Galeri Multimedia</h2>
        <table align="center">
            <tr align="center">
                <td>
                    <div class="image-container">
                        <img src="1 (1).jpg" alt="gambar 1">
                    </div>
                </td>
                <td>
                    <div class="image-container">
                        <img src="1 (2).jpg" alt="gambar 2">
                    </div>
                </td>
                <td>
                    <div class="image-container">
                        <img src="1 (3).jpg" alt="gambar 3">
                    </div>
                </td>
            </tr>
            <tr align="center">
                <td>
                    <div class="image-container">
                        <img src="1 (4).jpg" alt="gambar 4">
                    </div>
                </td>
                <td>
                    <div class="image-container">
                        <img src="1 (5).jpg" alt="gambar 5">
                    </div>
                </td>
                <td>
                    <div class="image-container">
                        <img src="1 (6).jpg" alt="gambar 6">
                    </div>
                </td>
            </tr>
            <tr align="center">
                <td>
                    <div class="image-container">
                        <img src="1 (7).jpg" alt="gambar 7">
                    </div>
                </td>
                <td>
                    <div class="image-container">
                        <img src="1 (8).jpg" alt="gambar 8">
                    </div>
                </td>
                <td>
                    <div class="video-container">
                        <video width="320" height="240" controls>
                            <source src="kalamalei.mp4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
